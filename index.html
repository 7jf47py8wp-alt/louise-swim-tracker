<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Louise Swim Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🏊 Louise Swim Tracker</h1>
    <p>Persoonlijk wedstrijddashboard</p>
</header>


<section class="dashboard">

<div class="card">
<h2>Wedstrijden</h2>
<p id="raceCount">0</p>
</div>

<div class="card">
<h2>Races</h2>
<p id="performanceCount">0</p>
</div>

<div class="card">
<h2>Persoonlijke Records</h2>
<p id="pbCount">0</p>
</div>

</section>


<section class="card">

<h2>Nieuwe race toevoegen</h2>

<label>Wedstrijd</label>
<input id="eventName" placeholder="bv. BK Jeugd">

<label>Datum</label>
<input id="date" type="date">

<label>Discipline</label>
<input id="stroke" placeholder="bv. 50m vrije slag">

<label>Tijd</label>
<input id="time" placeholder="bv. 32.45">


<button onclick="addRace()">
➕ Toevoegen
</button>

</section>


<section class="card">

<h2>Race Historiek</h2>

<table>

<thead>
<tr>
<th>Datum</th>
<th>Discipline</th>
<th>Tijd</th>
<th>PB</th>
</tr>
</thead>

<tbody id="raceTable">

</tbody>

</table>

</section>


<script src="app.js"></script>

</body>
</html>
